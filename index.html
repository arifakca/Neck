<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>LED Fluid Disc</title>
  <link rel="stylesheet" href="./style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <canvas id="scene"></canvas>

  <div class="panel">
    <div class="hint">Drag to rotate</div>

    <div class="section">Display</div>
    <label class="row">
      <span class="label">Resolution</span>
      <input id="resolution" type="range" min="12" max="80" step="1" value="28" />
      <span id="resolution-value" class="value">28</span>
    </label>
    <label class="row row-color">
      <span class="label">Liquid color</span>
      <input id="liquid-color" type="color" value="#e8d8a8" />
    </label>
    <label class="row row-color">
      <span class="label">Screen color</span>
      <input id="screen-color" type="color" value="#0a0a0a" />
    </label>
    <label class="row row-toggle">
      <span class="label">Glow</span>
      <input id="glow" type="checkbox" />
    </label>
    <label class="row row-toggle">
      <span class="label">Speed glow</span>
      <input id="speed-glow" type="checkbox" />
    </label>

    <div class="section">Physics</div>
    <label class="row">
      <span class="label">Liquid</span>
      <input id="amount" type="range" min="100" max="1000" step="50" value="600" />
      <span id="amount-value" class="value">600</span>
    </label>
    <label class="row">
      <span class="label">Gravity</span>
      <input id="gravity" type="range" min="0" max="20" step="0.5" value="8" />
      <span id="gravity-value" class="value">8</span>
    </label>
    <label class="row">
      <span class="label">Viscosity</span>
      <input id="viscosity" type="range" min="0" max="1" step="0.01" value="0.16" />
      <span id="viscosity-value" class="value">0.16</span>
    </label>
    <label class="row">
      <span class="label">Bounce</span>
      <input id="bounce" type="range" min="0" max="1" step="0.01" value="0.55" />
      <span id="bounce-value" class="value">0.55</span>
    </label>
    <label class="row">
      <span class="label">Spin</span>
      <input id="spin" type="range" min="0" max="2" step="0.05" value="1" />
      <span id="spin-value" class="value">1</span>
    </label>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
