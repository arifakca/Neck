<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>LED Fluid Disc</title>
  <link rel="stylesheet" href="./style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.js"
      }
    }
  </script>
</head>
<body>
  <canvas id="scene"></canvas>

  <audio id="bg-music" src="./src/Velvet%20Gallery%20Drift.mp3" loop preload="auto"></audio>
  <button class="mute-toggle" id="mute-toggle" type="button" aria-label="Mute background music">SOUND ON</button>

  <div class="spin-rail" id="spin-rail">
    <input id="spin-slider" type="range" min="0" max="360" step="1" value="0" aria-label="Rotate disc 0 to 360 degrees" />
  </div>

  <div class="panel" id="panel">
    <button class="panel-toggle" id="panel-toggle" aria-label="Minimize panel" type="button">−</button>
    <div class="panel-body">
    <div class="drag-pad" id="panel-drag"><div class="drag-grip"></div></div>
    <div class="hint">Drag the disc to rotate</div>

    <label class="row row-toggle">
      <span class="label">Phone gyro</span>
      <input id="gyro" type="checkbox" />
    </label>

    <div class="section">Display</div>
    <label class="row">
      <span class="label">Resolution</span>
      <input id="resolution" type="range" min="12" max="160" step="1" value="58" />
      <span id="resolution-value" class="value">58</span>
    </label>
    <label class="row">
      <span class="label">Particle size</span>
      <input id="footprint" type="range" min="0.2" max="2" step="0.05" value="1.3" />
      <span id="footprint-value" class="value">1.30</span>
    </label>
    <label class="row">
      <span class="label">Dot fill</span>
      <input id="dot-fill" type="range" min="0.3" max="1" step="0.02" value="0.84" />
      <span id="dot-fill-value" class="value">0.84</span>
    </label>
    <label class="row row-color">
      <span class="label">Liquid color</span>
      <input id="liquid-color" type="color" value="#00ffff" />
    </label>
    <label class="row row-toggle">
      <span class="label">Rainbow</span>
      <input id="rainbow" type="checkbox" />
    </label>
    <label class="row row-color">
      <span class="label">Screen color</span>
      <input id="screen-color" type="color" value="#000000" />
    </label>
    <label class="row row-toggle">
      <span class="label">Glow</span>
      <input id="glow" type="checkbox" checked />
    </label>
    <label class="row">
      <span class="label">Glow strength</span>
      <input id="glow-strength" type="range" min="0.2" max="2.5" step="0.1" value="2.5" />
      <span id="glow-strength-value" class="value">2.5</span>
    </label>
    <label class="row row-toggle">
      <span class="label">Speed glow</span>
      <input id="speed-glow" type="checkbox" checked />
    </label>
    <label class="row">
      <span class="label">Speed range</span>
      <input id="speed-ref" type="range" min="0.5" max="10" step="0.5" value="3" />
      <span id="speed-ref-value" class="value">3.0</span>
    </label>
    <label class="row row-toggle">
      <span class="label">Whitewater</span>
      <input id="whitewater" type="checkbox" checked />
    </label>
    <label class="row">
      <span class="label">Foam amount</span>
      <input id="whitewater-amount" type="range" min="0" max="1" step="0.05" value="1" />
      <span id="whitewater-amount-value" class="value">1.00</span>
    </label>
    <label class="row">
      <span class="label">Foam threshold</span>
      <input id="whitewater-threshold" type="range" min="0" max="0.95" step="0.05" value="0.55" />
      <span id="whitewater-threshold-value" class="value">0.55</span>
    </label>
    <label class="row row-color">
      <span class="label">Foam color</span>
      <input id="whitewater-color" type="color" value="#ffffff" />
    </label>

    <div class="section">Physics</div>
    <label class="row">
      <span class="label">Liquid</span>
      <input id="amount" type="range" min="100" max="1000" step="50" value="550" />
      <span id="amount-value" class="value">550</span>
    </label>
    <label class="row">
      <span class="label">Particle r</span>
      <input id="particle-r" type="range" min="0.018" max="0.05" step="0.002" value="0.018" />
      <span id="particle-r-value" class="value">0.018</span>
    </label>
    <label class="row">
      <span class="label">Gravity</span>
      <input id="gravity" type="range" min="0" max="20" step="0.5" value="7" />
      <span id="gravity-value" class="value">7</span>
    </label>
    <label class="row">
      <span class="label">Viscosity</span>
      <input id="viscosity" type="range" min="0" max="1" step="0.01" value="0.06" />
      <span id="viscosity-value" class="value">0.06</span>
    </label>
    <label class="row">
      <span class="label">Bounce</span>
      <input id="bounce" type="range" min="0" max="1" step="0.01" value="0.25" />
      <span id="bounce-value" class="value">0.25</span>
    </label>
    <label class="row">
      <span class="label">Spin</span>
      <input id="spin" type="range" min="0" max="2" step="0.05" value="0.4" />
      <span id="spin-value" class="value">0.40</span>
    </label>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
